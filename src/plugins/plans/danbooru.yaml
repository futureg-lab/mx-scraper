version: 1.0.0
target: [
  "https://danbooru.donmai.us/posts?page={page}&tags={TAG}",
  "https://danbooru.donmai.us/posts?page={page}&tags={TAG}"
]
# title: Some title for the batch (can be inferred from the page)

# applied to each target generated
filter: 
  select: a
  where: "attr.class: %preview-link"
  linkFrom: attr.href
  followLink:
    select: "picture>img"
    linkFrom: attr.src

iterate:
  page:
    range: [1, 2]
    onError: continue